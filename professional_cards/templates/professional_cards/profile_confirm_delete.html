{% include "professional_cards/_dashboard_shell_start.html" %}
<div class="mx-auto max-w-lg rounded-lg border border-slate-200 bg-white p-6">
  <h2 class="font-display text-xl font-bold text-slate-900">Delete {{ profile.full_name }}?</h2>
  <p class="mt-2 text-sm text-slate-600">This removes the professional profile and its services, portfolio items, testimonials, and documents.</p>
  <form method="post" class="mt-5 flex justify-end gap-2">
    {% csrf_token %}
    <a href="{% url 'professional_cards:list' %}" class="rounded-lg border border-slate-200 px-4 py-2 text-sm font-semibold">Cancel</a>
    <button class="rounded-lg bg-red-600 px-4 py-2 text-sm font-semibold text-white">Delete</button>
  </form>
</div>
{% include "professional_cards/_dashboard_shell_end.html" %}
