databases:
  - name: cards-db
    plan: free
    databaseName: cards
    user: cards_user

services:
  - type: web
    name: cards-web
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python -m gunicorn vcard_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cards-db
          property: connectionString
      - key: DEBUG
        value: false
      - key: WEB_CONCURRENCY
        value: 4
