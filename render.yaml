databases:
  - name: cards-db
    plan: free
    databaseName: cards
    user: cards_user

services:
  - type: web
    name: cards-web
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python manage.py migrate && python manage.py check --deploy && python -m gunicorn vcard_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --log-level debug --access-logfile - --error-logfile -
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cards-db
          property: connectionString
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: cards-web.onrender.com,tap2connectnepal.com,www.tap2connectnepal.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://cards-web.onrender.com,https://tap2connectnepal.com,https://www.tap2connectnepal.com
      - key: WEB_CONCURRENCY
        value: 1
