<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Card</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }
    
    .contact-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .contact-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }
    
    .contact-btn {
      transition: all 0.3s ease;
    }
    
    .contact-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }
    
    .contact-btn:active {
      transform: translateY(0);
    }
    
    .icon-wrapper {
      transition: transform 0.3s ease;
    }
    
    .contact-btn:hover .icon-wrapper {
      transform: scale(1.1);
    }
    
    .social-btn {
      transition: all 0.3s ease;
    }
    
    .social-btn:hover {
      transform: translateY(-3px) scale(1.05);
    }
    
    .copy-feedback {
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .profile-circle {
      position: relative;
      overflow: hidden;
    }
    
    .profile-circle::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: rotate(45deg);
      animation: shimmer 3s infinite;
    }
    
    @keyframes shimmer {
      0% {
        transform: translateX(-100%) translateY(-100%) rotate(45deg);
      }
      100% {
        transform: translateX(100%) translateY(100%) rotate(45deg);
      }
    }
    
    .timezone-badge {
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full p-8 overflow-y-auto" style="display: flex; align-items: flex-start; justify-content: center;"></div>
  <script>
    const defaultConfig = {
      background_color: "#0f172a",
      card_color: "#1e293b",
      primary_action_color: "#3b82f6",
      text_color: "#f1f5f9",
      secondary_text_color: "#94a3b8",
      contact_name: "Sarah Mitchell",
      job_title: "Senior Product Designer",
      company_name: "Creative Studios",
      profile_picture_url: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&h=400&fit=crop",
      email_address: "sarah.mitchell@creative.com",
      phone_number: "+1 (555) 123-4567",
      website_url: "www.sarahmitchell.design",
      bio_text: "Passionate about creating delightful user experiences through thoughtful design and innovation.",
      linkedin_url: "linkedin.com/in/sarahmitchell",
      twitter_url: "twitter.com/sarahdesigns",
      github_url: "github.com/sarahmitchell",
      instagram_url: "instagram.com/sarahdesigns",
      whatsapp_number: "+15551234567",
      timezone: "America/New_York",
      location_text: "New York, USA",
      font_family: "Outfit",
      font_size: 16
    };

    let timeInterval;

    async function onConfigChange(config) {
      const app = document.getElementById('app');
      const fontFamily = config.font_family || defaultConfig.font_family;
      const baseFontSize = config.font_size || defaultConfig.font_size;
      const backgroundColor = config.background_color || defaultConfig.background_color;
      const cardColor = config.card_color || defaultConfig.card_color;
      const primaryColor = config.primary_action_color || defaultConfig.primary_action_color;
      const textColor = config.text_color || defaultConfig.text_color;
      const secondaryTextColor = config.secondary_text_color || defaultConfig.secondary_text_color;
      
      document.body.style.fontFamily = `${fontFamily}, sans-serif`;
      document.body.style.background = backgroundColor;
      
      const name = config.contact_name || defaultConfig.contact_name;
      const title = config.job_title || defaultConfig.job_title;
      const company = config.company_name || defaultConfig.company_name;
      const profilePicture = config.profile_picture_url || defaultConfig.profile_picture_url;
      const email = config.email_address || defaultConfig.email_address;
      const phone = config.phone_number || defaultConfig.phone_number;
      const website = config.website_url || defaultConfig.website_url;
      const bio = config.bio_text || defaultConfig.bio_text;
      const linkedin = config.linkedin_url || defaultConfig.linkedin_url;
      const twitter = config.twitter_url || defaultConfig.twitter_url;
      const github = config.github_url || defaultConfig.github_url;
      const instagram = config.instagram_url || defaultConfig.instagram_url;
      const whatsapp = config.whatsapp_number || defaultConfig.whatsapp_number;
      const timezone = config.timezone || defaultConfig.timezone;
      const location = config.location_text || defaultConfig.location_text;
      
      // Get initials from name
      const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
      
      app.innerHTML = `
        <div class="contact-card w-full max-w-md rounded-3xl shadow-2xl p-8" style="background: ${cardColor};">
          <!-- Profile Section -->
          <div class="flex flex-col items-center mb-6">
            <div class="profile-circle w-32 h-32 rounded-full flex items-center justify-center mb-4 shadow-lg overflow-hidden" style="background: linear-gradient(135deg, ${primaryColor}, #8b5cf6); padding: ${profilePicture ? '4px' : '0'};">
              ${profilePicture ? 
                `<img src="${profilePicture}" alt="${name}" loading="lazy" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block;" onerror="console.error('Image failed to load:', this.src); this.style.display='none'; this.parentElement.style.padding='0'; this.parentElement.innerHTML='<span class=\\'text-5xl font-bold\\' style=\\'color: white; font-size: ${baseFontSize * 3}px;\\'>${initials}</span>';">` :
                `<span class="text-5xl font-bold" style="color: white; font-size: ${baseFontSize * 3}px;">${initials}</span>`

            </div>
            <h1 id="name" class="text-3xl font-bold mb-2 text-center px-4" style="color: ${textColor}; font-size: ${baseFontSize * 1.875}px;">${name}</h1>
            <p id="title" class="text-lg mb-1 text-center px-4" style="color: ${primaryColor}; font-size: ${baseFontSize * 1.125}px;">${title}</p>
            <p id="company" class="text-base text-center px-4" style="color: ${secondaryTextColor}; font-size: ${baseFontSize}px;">${company}</p>

              </svg>

                  <svg class="w-5 h-5" style="color: white;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>

                <div class="text-left">
                  <div class="text-xs" style="color: rgba(255, 255, 255, 0.8); font-size: ${baseFontSize * 0.75}px;">Email</div>

            <button class="contact-btn w-full rounded-xl py-3 px-4 flex items-center justify-between" style="background: ${primaryColor};" onclick="window.open('tel:${phone.replace(/\D/g, '')}', '_blank')">

          </button>

          <!-- Feedback message -->
          <div id="saveFeedback" class="mt-3 text-center text-sm font-semibold hidden copy-feedback" style="color: ${primaryColor}; font-size: ${baseFontSize * 0.875}px;">
            ✓ Contact saved!
          </div>
        </div>
      `;
      
      // Update time display
      function updateTime() {
        try {
          const now = new Date();
          const options = { timeZone: timezone, hour: '2-digit', minute: '2-digit', hour12: true };
          const timeStr = now.toLocaleTimeString('en-US', options);
          
          const dateOptions = { timeZone: timezone, weekday: 'short', month: 'short', day: 'numeric' };
          const dateStr = now.toLocaleDateString('en-US', dateOptions);
          
          const timeEl = document.getElementById('currentTime');
          const dateEl = document.getElementById('currentDate');
          
          if (timeEl) timeEl.textContent = timeStr;
          if (dateEl) dateEl.textContent = dateStr;
        } catch (e) {
          console.error('Invalid timezone:', timezone);
          const timeEl = document.getElementById('currentTime');
          const dateEl = document.getElementById('currentDate');
          if (timeEl) timeEl.textContent = '--:--';
          if (dateEl) dateEl.textContent = 'Invalid timezone';
        }
      }
      
      // Clear existing interval if any
      if (timeInterval) {
        clearInterval(timeInterval);
      }
      
      // Update time immediately and then every second
      updateTime();
      timeInterval = setInterval(updateTime, 1000);
      
      // Setup save contact functionality
      const saveBtn = document.getElementById('saveBtn');
      const saveFeedback = document.getElementById('saveFeedback');
      
      saveBtn.onclick = () => {
        // Create vCard format
        const vCard = `BEGIN:VCARD
VERSION:3.0
FN:${name}
TITLE:${title}
ORG:${company}
TEL;TYPE=VOICE:${phone}
TEL;TYPE=CELL:${whatsapp}
EMAIL:${email}
URL:https://${website}
NOTE:${bio}\\n\\nLocation: ${location}\\n\\nSocial Media:\\nLinkedIn: ${linkedin}\\nTwitter: ${twitter}\\nGitHub: ${github}\\nInstagram: ${instagram}
END:VCARD`;

        // Create blob and download link
        const blob = new Blob([vCard], { type: 'text/vcard' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${name.replace(/\s+/g, '_')}.vcf`;
        
        // Trigger download
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        // Show feedback
        saveFeedback.classList.remove('hidden');
        setTimeout(() => {
          saveFeedback.classList.add('hidden');
        }, 2000);
      };
    }

        ["timezone", config.timezone || defaultConfig.timezone],
        ["location_text", config.location_text || defaultConfig.location_text]
      ]);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });

      onConfigChange(defaultConfig);
